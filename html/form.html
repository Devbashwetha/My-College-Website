<body>
     <h1><b>Student Registration</b></h1>
    <p>Fill in your detail to a student account</p>
    <hr>
    
    <form>
        
        <label for="full name">Full name</label><br></br>
        <input type="text" id="full name" placeholder="enter you fullname"><br></br>

        <label for="email">Email address</label><br></br> <input type="text" id="email" placeholder="jane@example.com"><br></br>
        <label for="password">password</label><br></br>  <input type="text" id="password*" placeholder="at least 8 character "><br></br>
    </form>

    <hr>

    <h2>gender</h2>
    <form>
        <label for="male">male</label>
        <input type="radio" id="male" name="gender">

        <label for="female">female</label>
        <input type="radio" id="female" name="gender">
        <label for="non binar">non binary</label>
        <input type="radio" id="non binary" name="gender">

<label for="prefer not to say">prefer not to say</label>
        <input type="radio" id="prefer not to say" name="gender">
    </form>
<hr>
